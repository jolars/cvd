version: "3"

tasks:
  install:
    desc: Install the latex package locally
    cmds:
      - l3build install

  docs:
    desc: Build the package documentation
    cmds:
      - l3build-wrapped doc

  extract-dtx-docs:
    desc: Extract and convert DTX documentation to Markdown
    cmds:
      - texlua scripts/extract-dtx-docs.lua

  test:
    desc: Run the test suite, checking package functionality
    cmds:
      - l3build-wrapped check

  ctan:
    desc: Prepare the package for CTAN submission
    deps:
      - build-manual
    cmds:
      - l3build-wrapped ctan

  logo:
    desc: Build logo in multiple formats (PDF, PNG, SVG)
    dir: images
    cmds:
      - lualatex logo.tex
      - pdftocairo -png -singlefile -r 600 -transp logo.pdf logo
    sources:
      - images/logo.tex
    generates:
      - images/logo.pdf
      - images/logo.png
      - images/logo.svg

  opengraph:
    desc: Build OpenGraph image (1200x630 PNG)
    deps:
      - logo
    dir: images
    cmds:
      - lualatex og.tex
      - pdftocairo -png -singlefile -r 150 og.pdf og
    sources:
      - images/og.tex
    generates:
      - images/og.pdf
      - images/og.png
